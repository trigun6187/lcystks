name: Deploy Static Site to GitHub Pages

on:
  push:
    branches:
      - master # Trigger on push to master branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # <-- ADDED THIS LINE TO FORCE NODE 24

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies - FINAL FIX ATTEMPT
      run: |
        # 1. Install core tools first, at the root level
        pip install streamlit
        
        # 2. Install project dependencies
        cd stock_research_bot
        pip install -r requirements.txt
        cd .. # Return to root
        
    - name: Build Static HTML Report - RETRY 3
      run: |
        python -m streamlit build stock_research_bot/app.py --format html --output output/
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./output 
        enable_clone_depth: true
        force_orphan: true
