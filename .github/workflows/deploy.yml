name: Deploy Static Site to GitHub Pages

on:
  push:
    branches:
      - master # Trigger on push to master branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install streamlit
        cd stock_research_bot
        pip install -r requirements.txt
        cd .. # Return to root
        
    - name: Build Static HTML Report - FINAL ATTEMPT 4
      run: |
        # Execute build from root, referencing path
        streamlit build stock_research_bot/app.py --format html --output output/
        
    - name: Deploy Artifacts to gh-pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./output 
        force_orphan: true 
        publish_branch: gh-pages 
        external_token: ${{ secrets.PAT_FOR_GH_PAGES }}
