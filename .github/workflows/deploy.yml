name: Deploy Static Site Artifact to GitHub Pages

on:
  push:
    branches:
      - master # Trigger on push to master branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pandas
        cd stock_research_bot
        pip install -r requirements.txt 
        cd ..
        
    - name: Generate Static HTML Report
      run: |
        # Run the python script directly. This creates index.html in the root directory.
        python stock_research_bot/app.py
        
    - name: Commit and Deploy Artifacts to gh-pages branch
      run: |
        # 1. Add generated files (index.html) and workflow file
        git config --global user.name "trigun6187"
        git config --global user.email "trigun6187@users.noreply.github.com"
        git add .github/workflows/deploy.yml index.html
        git commit -m "chore(ci): Deploy static HTML artifact via direct git push"
        
        # 2. Push to gh-pages branch using the personal PAT configured on master remote
        git push origin HEAD:gh-pages
