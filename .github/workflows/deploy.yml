name: Deploy Static Site Artifact to GitHub Pages

on:
  push:
    branches:
      - master # Trigger on push to master branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pandas # Only need pandas to format the mock data in app.py
        cd stock_research_bot
        pip install -r requirements.txt # This will install streamlit if pandas needs it, but we don't run streamlit
        cd ..
        
    - name: Generate Static HTML Report
      run: |
        # Run the python script directly. This creates index.html in the root directory.
        python stock_research_bot/app.py
        
    - name: Deploy Artifacts to gh-pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./ # Deploy the root directory, which now contains the index.html artifact
        force_orphan: true 
        publish_branch: gh-pages 
        external_token: ${{ secrets.PAT_FOR_GH_PAGES }}
