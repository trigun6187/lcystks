name: Deploy Static Site to GitHub Pages

on:
  push:
    branches:
      - master # Trigger on push to master branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies and Build Static HTML Report
      run: |
        # Install app dependencies
        cd stock_research_bot
        pip install -r requirements.txt
        cd .. # Return to root
        
        # Install Streamlit and build to root/output/ directory
        pip install 'streamlit>=1.29.0'
        python -m streamlit build stock_research_bot/app.py --format html --output output/

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./output # Deploy the contents of the 'output' directory created above
        enable_clone_depth: true
        force_orphan: true
