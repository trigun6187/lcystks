name: Deploy Static Site to GitHub Pages

on:
  push:
    branches:
      - master # Trigger on push to master branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd stock_research_bot
        pip install -r requirements.txt
        
    - name: Build Static HTML Report - RETRY
      run: |
        # Reverting to a more direct approach that worked for other Streamlit pages.
        # We run the app *as a script* to print to stdout, and rely on the deployment action 
        # to handle the output correctly, or we must manually deploy content.
        # Forcing a standard build command based on latest practice:
        pip install streamlit
        streamlit build stock_research_bot/app.py --format html --output output/
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./output 
        enable_clone_depth: true
        force_orphan: true
