name: Deploy Static Site to GitHub Pages

on:
  push:
    branches:
      - master # Trigger on push to master branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install streamlit
        cd stock_research_bot
        pip install -r requirements.txt
        cd ..
        
    # Skip the failing 'streamlit build' command entirely.
        
    - name: Deploy to GitHub Pages (Fallback: Deploy source files)
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./stock_research_bot # Deploy the repository folder itself
        enable_clone_depth: true
        force_orphan: true
