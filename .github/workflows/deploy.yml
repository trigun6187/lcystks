name: Deploy Static Site to GitHub Pages

on:
  push:
    branches:
      - master # Trigger on push to master branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Opt into Node 24 to avoid deprecation warnings causing issues
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        # Install requirements for running the script locally in the runner
        pip install -r stock_research_bot/requirements.txt
        
    - name: Generate Static HTML Report
      run: |
        # Run the python script directly to generate index.html in the project root.
        python stock_research_bot/app.py
        
    - name: Deploy Report to gh-pages branch
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: . # Publish everything from the root (should contain index.html)
        force_orphan: true 
        publish_branch: gh-pages 
