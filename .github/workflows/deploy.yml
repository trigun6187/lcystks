name: Deploy Static Site to GitHub Pages

on:
  push:
    branches:
      - master # Trigger on push to master branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Opt into Node 24 to avoid deprecation warnings causing issues
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install streamlit
        cd stock_research_bot
        pip install -r requirements.txt
        cd ..
        
    - name: Generate Static HTML Report
      run: |
        python stock_research_bot/app.py
        
    - name: Deploy Report to gh-pages branch
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./ # Publish report.html and source files from the root
        force_orphan: true 
        publish_branch: gh-pages 
        # CRITICAL FIX: Use the explicit PAT instead of the default token for pushing to gh-pages
        external_token: ${{ secrets.PAT_FOR_GH_PAGES }} 
