name: Deploy Static Site to GitHub Pages

on:
  push:
    branches:
      - master # Trigger on push to master branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r stock_research_bot/requirements.txt
        pip install streamlit # Install streamlit explicitly for the build command
        
    - name: Build Static HTML Report - RETRY 2
      # Run from the root directory, referencing the app path explicitly
      run: |
        streamlit build stock_research_bot/app.py --format html --output output/
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./output 
        enable_clone_depth: true
        force_orphan: true
